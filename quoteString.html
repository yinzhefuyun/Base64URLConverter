<!DOCTYPE html>
<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <title>使用引号框起来字符串</title>
  <style>
   body {
      font-family: sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
    }
    textarea {
      width: 100%;
      height: 35vh;
      font-family: monospace;
      font-size: 14px;
      margin-bottom: 20px;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: vertical;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }
    button {
      padding: 10px 15px;
      font-size: 14px;
      margin: 5px 10px 15px 0;
      cursor: pointer;
    }
    .label {
      font-weight: bold;
      margin: 10px 0 5px;
    }
  </style>
<body>
  <h2>使用引号框起来字符串</h2>
  
  <textarea id="inputText" placeholder="在这里粘贴你的文本文档，每行一段..." spellcheck="false"></textarea>
  
  <div>
    <label><input type="checkbox" id="spaceCheckbox"> 开头添加空格</label>
    <label><input type="checkbox" id="newlineCheckbox" checked> 结尾添加换行</label>
    <button onclick="processText()">处理</button>
    <button onclick="restoreText()">还原</button>
    <button onclick="copyResult()">复制结果</button>
    <button onclick="openIndex()">返回首页</button>
  </div>
  
  <textarea id="outputText" placeholder="排序结果会显示在这里..." readonly=""></textarea>

  <script>


    function processText() {
      const input = document.getElementById("inputText").value;
      const lines = input.split('\n');
      const maxLength = Math.max(...lines.map(line => line.length)) + 1;
      const spacePrefix = document.getElementById("spaceCheckbox").checked;
        const newlineSuffix = document.getElementById("newlineCheckbox").checked;
        const result = lines.map(line => {
          const padded = line.padEnd(maxLength, ' ');
          let paddedStr;
          if (spacePrefix && newlineSuffix) {
            paddedStr = `" ${padded}\\n"`;
          } else if (spacePrefix) {
            paddedStr = `" ${padded}"`;
          } else if (newlineSuffix) {
            paddedStr = `"${padded}\\n"`;
          } else {
            paddedStr = `"${padded}"`;
          }
          return paddedStr;
        }).join(' + \n') + ' ;';
      document.getElementById("outputText").value = result;
    }

    function restoreText() {
       const input = document.getElementById("inputText").value;
       const lines = input.split('\n');
       const spacePrefix = document.getElementById("spaceCheckbox").checked;
       const newlineSuffix = document.getElementById("newlineCheckbox").checked;
       const result = lines.map(line => {
         const match = line.match(/"([^"]*)"/);
         if (match) {
           let content = match[1];
           if (newlineSuffix) {
             content = content.replace(/\\n/, '');
           }
           if (spacePrefix) {
             content = content.replace(/^ /, '');
           }
           return content.replace(/ +$/, '');
         }
         return '';
       }).join('\n');
       document.getElementById("outputText").value = result;
     }

    function copyResult() {
      const output = document.getElementById("outputText");
      output.select();
      output.setSelectionRange(0, 99999); // 兼容移动端
      document.execCommand("copy");
    }
    
    function openIndex() {
      //打开新窗口在新窗口打开首页
      window.open('index.html', '_blank');
    }
  </script>


</body>
