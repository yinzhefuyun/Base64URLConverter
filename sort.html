<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>按拼音排序每行字符</title>
  <style>
   body {
      font-family: sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
    }
    textarea {
      width: 100%;
      height: 35vh;
      font-family: monospace;
      font-size: 14px;
      margin-bottom: 20px;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: vertical;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }
    button {
      padding: 10px 15px;
      font-size: 14px;
      margin: 5px 10px 15px 0;
      cursor: pointer;
    }
    .label {
      font-weight: bold;
      margin: 10px 0 5px;
    }
  </style>
</head>
<body>
  <h2>每行按拼音字母顺序排序</h2>
  
  <textarea id="inputText" placeholder="在这里粘贴你的文本文档，每行一段..."></textarea>
  
  <div>
    <button onclick="sortByPinyin()">排序</button>
    <button onclick="copyResult()">复制结果</button>
    <button onclick="openIndex()">返回首页</button>
  </div>
  
  <textarea id="outputText" placeholder="排序结果会显示在这里..." readonly></textarea>

  <script>
    function sortByPinyin() {
      const input = document.getElementById("inputText").value;
      const lines = input.split(/\r?\n/);

      // 使用 Intl.Collator 实现中文拼音排序
      const collator = new Intl.Collator("zh-CN-u-co-pinyin");

      const result = lines.map(line => {
        return line.split("").sort(collator.compare).join("");
      });

      document.getElementById("outputText").value = result.join("\n");
    }

    function copyResult() {
      const output = document.getElementById("outputText");
      output.select();
      output.setSelectionRange(0, 99999); // 兼容移动端
      document.execCommand("copy");
      alert("结果已复制到剪贴板！");
    }
    
    function openIndex() {
      //打开新窗口在新窗口打开首页
      window.open('index.html', '_blank');
    }
  </script>
</body>
</html>
