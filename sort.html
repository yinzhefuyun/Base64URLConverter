<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>按拼音排序每行字符</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    textarea {
      width: 100%;
      height: 200px;
      padding: 10px;
      margin: 10px 0;
      font-size: 14px;
      line-height: 1.5;
      box-sizing: border-box;
    }
    button {
      margin: 5px 10px 15px 0;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>每行按拼音字母顺序排序</h2>
  
  <textarea id="inputText" placeholder="在这里粘贴你的文本文档，每行一段..."></textarea>
  
  <div>
    <button onclick="sortByPinyin()">排序</button>
    <button onclick="copyResult()">复制结果</button>
  </div>
  
  <textarea id="outputText" placeholder="排序结果会显示在这里..." readonly></textarea>

  <script>
    function sortByPinyin() {
      const input = document.getElementById("inputText").value;
      const lines = input.split(/\r?\n/);

      // 使用 Intl.Collator 实现中文拼音排序
      const collator = new Intl.Collator("zh-CN-u-co-pinyin");

      const result = lines.map(line => {
        return line.split("").sort(collator.compare).join("");
      });

      document.getElementById("outputText").value = result.join("\n");
    }

    function copyResult() {
      const output = document.getElementById("outputText");
      output.select();
      output.setSelectionRange(0, 99999); // 兼容移动端
      document.execCommand("copy");
      alert("结果已复制到剪贴板！");
    }
  </script>
</body>
</html>
